services:
  db:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-potato_twin}
      POSTGRES_USER: ${POSTGRES_USER:-potato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      TZ: ${TZ:-Europe/Bratislava}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-potato} -d ${POSTGRES_DB:-potato_twin}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  db_data:
